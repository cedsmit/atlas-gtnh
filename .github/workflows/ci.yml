name: CI

on:
    push:
    pull_request:

jobs:
    backend:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Setup uv
              uses: astral-sh/setup-uv@v3

            - name: Install dependencies
              run: uv sync

            - name: Ruff Lint
              run: uv run ruff check .

            - name: Ruff Format Check
              run: uv run ruff format --check .

            - name: MyPy
              run: uv run mypy .

            - name: Pytest
              run: uv run pytest

    frontend:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: ESLint
              run: npm run lint

            - name: Tests
              run: npm run test -- --run

            - name: Build
              run: npm run build
