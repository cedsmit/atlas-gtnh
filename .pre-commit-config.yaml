repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: uv run --directory backend ruff check --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run --directory backend ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run --directory backend mypy app
        language: system
        pass_filenames: false
        always_run: true

      - id: prettier
        name: prettier (frontend)
        entry: npx --prefix frontend prettier --write --ignore-path frontend/.prettierignore --config frontend/.prettierrc frontend
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|cjs|mjs|css|json|html|md)$
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: npx --prefix frontend eslint --ext ts,tsx --report-unused-disable-directives --max-warnings 0 frontend/src
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
